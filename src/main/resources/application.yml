spring:
  application:
    name: hospital-entities

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8081
  servlet:
    context-path: /hospital-gateway

app:
  otp:
    ttl-seconds: 300
    max-attempts: 5
  security:
    jwt:
      issuer: hospital-gateway
      access-ttl-seconds: 3600
      register-ttl-seconds: 600
  core:
    base-url: ${CORE_BASE_URL:https://localhost:8443}

logging:
  level:
    root: INFO
    com.hospital: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.springframework.data.mongodb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  # Logback rolling policy (max size / retention)
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
